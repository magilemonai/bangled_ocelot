# ==========================================================================
# Ma no Kuni (間の国) — Musical Composition Data
#
# Note format: [midi_note_number, duration_in_beats, velocity]
#   - MIDI notes: C4=60, D4=62, E4=64, F4=65, G4=67, A4=69, B4=71
#   - Duration: 1.0 = quarter note, 0.5 = eighth, 2.0 = half, 4.0 = whole
#   - Velocity: 0-127 (ppp=20, pp=35, p=50, mp=65, mf=80, f=95, ff=110)
#   - Pitch of -1 denotes a rest
#
# Scales used:
#   D Hirajoshi:  D E F A Bb        (62 64 65 69 70)
#   D In scale:   D Eb G A Bb       (62 63 67 69 70)
#   A Yo scale:   A B D E F#        (69 71 74 76 78)
#   D Kumoi:      D E F A B         (62 64 65 69 71)
#   D Iwato:      D Eb G Ab C       (62 63 67 68 72)
#   D natural minor: D E F G A Bb C (62 64 65 67 69 70 72)
#   G major:      G A B C D E F#    (67 69 71 72 74 76 78)
#   D major:      D E F# G A B C#   (62 64 66 67 69 71 73)
# ==========================================================================

themes:

  # -----------------------------------------------------------------------
  # 1. AOI'S THEME — "The Space Between Heartbeats"
  #    Key: D natural minor | Tempo: 72 BPM | Time: 4/4
  #    Solo flute melody. Gentle, searching. The intervals are mostly
  #    seconds and thirds — close, intimate, like someone speaking softly.
  #    The melody rises with hope and falls with doubt.
  # -----------------------------------------------------------------------
  aoi_theme:
    motif_id: aoi_theme
    name: "Aoi's Theme"
    key_root: 62  # D4
    scale: natural_minor
    tempo_bpm: 72
    time_signature: "4/4"
    primary_instrument: flute
    tags: [character, aoi, exploration, contemplative]

    phrases:
      # Main melody — the searching phrase
      - phrase_id: aoi_main
        name: "Aoi's search"
        tags: [main, melody]
        notes:
          #        pitch  dur   vel   | note    description
          - [62,   1.0,   65]         # D4    - begins on the tonic, grounded
          - [65,   0.75,  70]         # F4    - minor third, the question
          - [67,   0.25,  55]         # G4    - passing tone upward
          - [69,   1.5,   75]         # A4    - fifth, the longing
          - [-1,   0.5,   0]          # rest  - breath, the first ma
          - [70,   0.5,   60]         # Bb4   - minor sixth, shadow
          - [69,   0.75,  70]         # A4    - step back down
          - [67,   1.25,  65]         # G4    - settling but not resolved
          - [-1,   1.0,   0]          # rest  - longer pause, listening
          - [65,   0.5,   60]         # F4    - reaching down
          - [64,   0.5,   55]         # E4    - second degree, tension
          - [62,   2.0,   70]         # D4    - return home, but the journey continues
          - [-1,   1.5,   0]          # rest  - the space after the phrase

      # Ascending hope phrase — used when Aoi gains courage
      - phrase_id: aoi_hope
        name: "Aoi's courage"
        tags: [development, ascending]
        notes:
          - [62,   0.75,  70]         # D4    - begins grounded
          - [64,   0.5,   65]         # E4    - stepping up
          - [65,   0.5,   70]         # F4    - continuing
          - [67,   0.75,  75]         # G4    - gaining momentum
          - [69,   1.0,   80]         # A4    - reaching
          - [72,   0.5,   85]         # C5    - the seventh, almost there
          - [74,   2.0,   80]         # D5    - octave! the arrival
          - [-1,   0.5,   0]          # rest
          - [72,   0.5,   65]         # C5    - gentle descent begins
          - [69,   1.0,   60]         # A4    - settling
          - [67,   1.5,   55]         # G4    - peaceful
          - [65,   2.0,   50]         # F4    - the minor third, still searching
          - [-1,   2.0,   0]          # rest  - long exhale

      # Descending doubt phrase — used during difficult moments
      - phrase_id: aoi_doubt
        name: "Aoi's doubt"
        tags: [development, descending, melancholy]
        notes:
          - [69,   1.0,   55]         # A4    - starts high, uncertain
          - [67,   0.75,  50]         # G4    - falling
          - [-1,   0.75,  0]          # rest  - hesitation
          - [65,   1.0,   45]         # F4    - further down
          - [64,   0.5,   40]         # E4    - almost giving up
          - [62,   1.5,   50]         # D4    - landing on tonic
          - [60,   0.5,   45]         # C4    - below tonic, deep sadness
          - [62,   3.0,   40]         # D4    - return, but quietly
          - [-1,   2.0,   0]          # rest  - the weight of silence

    chord_progression:
      progression_id: aoi_chords
      name: "Aoi's harmonic journey"
      key_root: 62
      scale: natural_minor
      tags: [character, emotional]
      chords:
        - name: Dm
          pitches: [50, 57, 62, 65]   # D3 A3 D4 F4
          duration: 4.0
          velocity: 55
          instrument: cello
        - name: Bb
          pitches: [46, 53, 58, 62]   # Bb2 F3 Bb3 D4
          duration: 4.0
          velocity: 60
          instrument: cello
        - name: Gm
          pitches: [43, 50, 55, 58]   # G2 D3 G3 Bb3
          duration: 4.0
          velocity: 55
          instrument: cello
        - name: A
          pitches: [45, 52, 57, 61]   # A2 E3 A3 C#4
          duration: 4.0
          velocity: 60
          instrument: cello

  # -----------------------------------------------------------------------
  # 2. GRANDMOTHER'S THEME — "What the Garden Remembers"
  #    Key: G major | Tempo: 66 BPM | Time: 3/4 (waltz)
  #    Koto melody. Warm and unhurried. The intervals are wider — fourths
  #    and fifths — the confidence of someone who has lived long and well.
  #    In 3/4 time, like a gentle dance with memory.
