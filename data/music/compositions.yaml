    phrases:
      # Main melody — gentle, knowing
      - phrase_id: grandmother_main
        name: "Grandmother's warmth"
        tags: [main, melody, waltz]
        notes:
          - [67,   1.0,   60]         # G4    - home note, steady
          - [71,   0.5,   65]         # B4    - major third, warmth
          - [72,   1.5,   60]         # C5    - fourth, openness
          - [74,   1.0,   70]         # D5    - fifth, strength
          - [72,   0.5,   55]         # C5    - step back
          - [71,   1.0,   65]         # B4    - grace note territory
          - [-1,   1.0,   0]          # rest  - a smile in silence
          - [74,   0.75,  60]         # D5    - reaching up
          - [76,   0.75,  65]         # E5    - sixth, tenderness
          - [74,   1.5,   60]         # D5    - settling
          - [72,   1.0,   55]         # C5    - descending
          - [71,   0.5,   50]         # B4    - penultimate
          - [67,   3.0,   60]         # G4    - home, always home
          - [-1,   1.5,   0]          # rest  - like tea cooling

      # Koto arpeggiated phrase — used during tea ceremony moments
      - phrase_id: grandmother_koto_arpeggio
        name: "Tea ceremony"
        tags: [arpeggio, peaceful, koto]
        notes:
          - [55,   0.5,   50]         # G3    - low root
          - [59,   0.5,   55]         # B3    - third
          - [62,   0.5,   50]         # D4    - fifth
          - [67,   1.0,   60]         # G4    - octave
          - [71,   0.5,   55]         # B4    - third above
          - [74,   1.5,   50]         # D5    - fifth above, let ring
          - [-1,   1.0,   0]          # rest
          - [72,   0.5,   45]         # C5    - color tone
          - [67,   0.5,   50]         # G4    - back to root
          - [62,   0.5,   45]         # D4
          - [59,   0.5,   40]         # B3
          - [55,   2.0,   50]         # G3    - deep root, settled
          - [-1,   1.5,   0]          # rest  - steam rising from the cup

    chord_progression:
      progression_id: grandmother_chords
      name: "Grandmother's garden"
      key_root: 67
      scale: major
      tags: [warm, safe]
      chords:
        - name: G
          pitches: [43, 47, 50, 55]   # G2 B2 D3 G3
          duration: 3.0
          velocity: 50
          instrument: piano
        - name: Em
          pitches: [40, 47, 52, 55]   # E2 B2 E3 G3
          duration: 3.0
          velocity: 45
          instrument: piano
        - name: C
          pitches: [36, 43, 48, 52]   # C2 G2 C3 E3
          duration: 3.0
          velocity: 50
          instrument: piano
        - name: D
          pitches: [38, 42, 50, 54]   # D2 F#2 D3 F#3
          duration: 3.0
          velocity: 55
          instrument: piano

  # -----------------------------------------------------------------------
  # 3. SPIRIT WORLD THEME — "The Other Side of Air"
  #    Key: D Hirajoshi | Tempo: 54 BPM | Time: free
  #    Shakuhachi with breath tones. The Hirajoshi scale gives it an
  #    otherworldly, contemplative quality. Notes are separated by
  #    long silences. The melody does not follow Western phrasing —
  #    each note is its own event, connected by the silence between.
  # -----------------------------------------------------------------------
  spirit_world_theme:
    motif_id: spirit_world_theme
    name: "Spirit World Theme"
    key_root: 62  # D4
    scale: hirajoshi
    tempo_bpm: 54
    time_signature: "free"
    primary_instrument: shakuhachi
    tags: [spirit, otherworldly, contemplative, exploration]

    phrases:
      # Main spirit melody — free-flowing, breath-driven
      - phrase_id: spirit_main
        name: "Beyond the veil"
        tags: [main, melody, breath]
        notes:
          - [-1,   2.0,   0]          # rest  - the spirit world begins with silence
          - [62,   3.0,   55]         # D4    - root, emerging from nothing
          - [-1,   1.5,   0]          # rest  - the space holds meaning
          - [64,   1.0,   50]         # E4    - second of Hirajoshi
          - [65,   2.5,   60]         # F4    - minor second above, tension
          - [-1,   2.0,   0]          # rest  - breathing
          - [69,   2.0,   55]         # A4    - leap to the fifth interval
          - [70,   1.5,   50]         # Bb4   - the flat sixth, melancholy
          - [69,   3.0,   45]         # A4    - return, fading
          - [-1,   3.0,   0]          # rest  - long pause, the world listens
          - [65,   2.0,   50]         # F4    - descending
          - [62,   4.0,   40]         # D4    - return to root, very soft
          - [-1,   4.0,   0]          # rest  - the silence after is part of the music

      # Bells and water phrase — koto arpeggios in Hirajoshi
      - phrase_id: spirit_bells
        name: "Spirit bells"
        tags: [arpeggio, bells, koto]
        notes:
          - [74,   0.5,   35]         # D5    - high, bell-like
          - [-1,   1.0,   0]          # rest
          - [70,   0.5,   30]         # Bb4
          - [69,   0.75,  35]         # A4
          - [-1,   1.5,   0]          # rest
          - [65,   0.5,   30]         # F4
          - [64,   0.5,   25]         # E4
          - [62,   1.0,   35]         # D4
          - [-1,   2.0,   0]          # rest
          - [74,   0.75,  40]         # D5    - bell returns
          - [77,   0.5,   35]         # F5
          - [81,   2.0,   30]         # A5    - very high, fading like a distant bell
          - [-1,   3.0,   0]          # rest  - echo into emptiness

      # Deep spirit drone — sho organ chord
      - phrase_id: spirit_drone
        name: "Breath of the other world"
        tags: [drone, sho, sustained]
        notes:
          # Sho plays cluster chords — all notes sustained simultaneously
          # Represented as a sequence for the data format
          - [50,   8.0,   35]         # D3    - root drone
          - [57,   8.0,   30]         # A3    - fifth above
          - [62,   8.0,   35]         # D4    - octave
          - [65,   8.0,   25]         # F4    - color tone
          - [69,   8.0,   30]         # A4    - upper fifth
          - [-1,   4.0,   0]          # rest  - the world exhales

    chord_progression:
