          instrument: cello

  # -----------------------------------------------------------------------
  # 6. LOVE THEME — "Two Strings, One Song"
  #    Key: D major (violin) / D Kumoi (koto) | Tempo: 60 BPM | Time: 4/4
  #    A duet. The violin plays in Western D major; the koto answers in
  #    Japanese Kumoi scale on the same root. They share D, E, and A but
  #    diverge on the third (F# vs F) and seventh (C# vs B). The moments
  #    where they agree are the moments of connection. The rests between
  #    their phrases are the ache of distance.
  # -----------------------------------------------------------------------
  love_theme:
    motif_id: love_theme
    name: "Love Theme"
    key_root: 62  # D4
    scale: major  # blended with kumoi
    tempo_bpm: 60
    time_signature: "4/4"
    primary_instrument: violin
    tags: [character, love, duet, beautiful]

    phrases:
      # Violin phrase — Western, yearning
      - phrase_id: love_violin
        name: "Violin — the one who reaches"
        tags: [violin, western, call]
        instrument: violin
        notes:
          - [62,   1.0,   65]         # D4    - shared root, common ground
          - [66,   1.5,   70]         # F#4   - major third — the Western voice
          - [69,   1.0,   75]         # A4    - shared fifth, they agree here
          - [-1,   1.0,   0]          # rest  - waiting for the answer
          - [71,   0.5,   65]         # B4    - Western sixth
          - [73,   0.5,   60]         # C#5   - leading tone, longing
          - [74,   2.0,   75]         # D5    - octave arrival
          - [-1,   1.5,   0]          # rest  - does the koto answer?
          - [73,   0.5,   60]         # C#5   - reaching back
          - [71,   0.5,   55]         # B4    - descending
          - [69,   1.0,   65]         # A4    - the shared note, a bridge
          - [66,   1.5,   60]         # F#4   - Western third
          - [62,   2.0,   55]         # D4    - home, but alone
          - [-1,   2.0,   0]          # rest  - the distance between them

      # Koto phrase — Japanese Kumoi scale, answering
      - phrase_id: love_koto
        name: "Koto — the one who answers"
        tags: [koto, japanese, response]
        instrument: koto
        notes:
          - [-1,   2.0,   0]          # rest  - listens to the violin first
          - [62,   1.0,   55]         # D4    - same root, recognition
          - [64,   0.5,   60]         # E4    - shared second
          - [65,   1.5,   65]         # F4    - NATURAL third — the Kumoi voice
          - [69,   1.0,   60]         # A4    - shared fifth, meeting point
          - [-1,   1.0,   0]          # rest  - a breath of hope
          - [71,   0.75,  55]         # B4    - Kumoi fifth degree
          - [69,   0.75,  60]         # A4    - step back
          - [65,   1.0,   55]         # F4    - the natural third, so different from F#
          - [62,   2.5,   60]         # D4    - home, but reaching
