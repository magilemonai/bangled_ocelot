          duration: 8.0
          velocity: 40
          instrument: sho
        - name: F_cluster
          pitches: [53, 65, 69]       # F3 F4 A4 — suspended
          duration: 6.0
          velocity: 35
          instrument: sho
        - name: Bb_open
          pitches: [46, 58, 65]       # Bb2 Bb3 F4 — dark
          duration: 8.0
          velocity: 40
          instrument: sho
        - name: D_return
          pitches: [38, 50, 62, 69]   # D2 D3 D4 A4 — deep root
          duration: 10.0
          velocity: 35
          instrument: sho

  # -----------------------------------------------------------------------
  # 4. MA THEME — "The Weight of Silence"
  #    Key: D (root and fifth only) | Tempo: 40 BPM | Time: free
  #    Almost nothing. The ma_scale contains only the root and fifth.
  #    Each note is an event; each silence is the music. The velocity
  #    is very low throughout. The space between notes ranges from
  #    4 to 12 beats (6 to 18 seconds at 40 BPM).
  # -----------------------------------------------------------------------
  ma_theme:
    motif_id: ma_theme
    name: "Ma Theme"
    key_root: 62  # D4
    scale: ma_scale
    tempo_bpm: 40
    time_signature: "free"
    primary_instrument: shakuhachi
    tags: [ma, silence, profound, vignette]

    phrases:
      # The ma phrase — more silence than sound
      - phrase_id: ma_main
        name: "The space between"
        tags: [main, silence, breath]
        notes:
          - [-1,   6.0,   0]          # rest  - six beats of nothing (9 seconds)
          - [62,   4.0,   25]         # D4    - one note, barely there
          - [-1,   8.0,   0]          # rest  - twelve seconds of silence
          - [69,   3.0,   20]         # A4    - the fifth, even softer
          - [-1,  10.0,   0]          # rest  - fifteen seconds. listen.
          - [62,   6.0,   15]         # D4    - root again, dying away
          - [-1,  12.0,   0]          # rest  - the longest silence. this IS the music.
          - [50,   8.0,   20]         # D3    - low octave, like a memory
          - [-1,   8.0,   0]          # rest  - and then nothing

      # Ma response — even sparser, for deepest moments
      - phrase_id: ma_deep
        name: "The deepest pause"
        tags: [deep, almost_nothing]
        notes:
          - [-1,  16.0,   0]          # rest  - twenty-four seconds of pure silence
          - [62,   8.0,   12]         # D4    - barely audible
          - [-1,  20.0,   0]          # rest  - thirty seconds. the player sits with it.
          - [57,   6.0,   10]         # A3    - low fifth, like a heartbeat heard through walls
          - [-1,  16.0,   0]          # rest  - silence has texture here

    chord_progression:
      progression_id: ma_chords
      name: "Ma harmony"
      key_root: 62
      scale: ma_scale
      tags: [ma, minimal]
      chords:
        - name: D_bare
          pitches: [50, 62]           # D3 D4 — just the octave
          duration: 16.0
          velocity: 20
          instrument: shakuhachi
        - name: silence
          pitches: []                 # Nothing. Silence as a chord.
          duration: 16.0
          velocity: 0
          instrument: silence
        - name: A_bare
          pitches: [45, 57]           # A2 A3 — the fifth, an octave below
          duration: 12.0
          velocity: 15
          instrument: shakuhachi

  # -----------------------------------------------------------------------
  # 5. BATTLE THEME — "The Veil Tears"
  #    Key: E natural minor (with In scale overlay) | Tempo: 152 BPM | Time: 7/8
  #    Taiko rhythm with shamisen melody. The 7/8 time signature creates
  #    urgency — the extra beat is always chasing. The shamisen uses the
  #    In scale (Miyako-bushi) for its dark, intense character. The taiko
  #    pattern is traditional matsuri-style but accelerated.
  # -----------------------------------------------------------------------
  battle_theme:
    motif_id: battle_theme
    name: "Battle Theme"
    key_root: 64  # E4
    scale: in_scale
    tempo_bpm: 152
    time_signature: "7/8"
    primary_instrument: shamisen
    tags: [battle, combat, urgent, fierce]

    phrases:
      # Main shamisen attack melody
      - phrase_id: battle_main
        name: "The veil tears"
        tags: [main, melody, aggressive]
        notes:
          - [64,   0.5,   95]         # E4    - root, strong attack
          - [65,   0.25,  100]        # F4    - flat second (In scale), dark
          - [64,   0.25,  90]         # E4    - return
          - [69,   0.5,   100]        # A4    - fourth, driving
          - [71,   0.75,  105]        # B4    - fifth, peak
          - [69,   0.25,  90]         # A4    - pull back
          - [65,   0.5,   95]         # F4    - the In scale darkness
          - [64,   0.75,  100]        # E4    - root, grounding the phrase
          - [-1,   0.25,  0]          # rest  - breath between strikes
          - [71,   0.5,   105]        # B4    - leap up
          - [72,   0.25,  100]        # C5    - flat sixth
          - [71,   0.25,  95]         # B4    - ornament
          - [69,   0.5,   100]        # A4    - descending
          - [65,   0.5,   95]         # F4    - dark interval
          - [64,   1.0,   110]        # E4    - final strike, held

      # Taiko rhythm pattern (using low notes to represent drum hits)
      # Pitch is approximate — represents don (low) and ka (high) strokes
      - phrase_id: battle_taiko
        name: "Taiko pattern"
        tags: [rhythm, taiko, percussion]
        notes:
          # DON don don KA don don KA  (7 beats in 7/8)
          - [36,   0.5,   110]        # DON   - big strike
          - [36,   0.5,   80]         # don   - smaller
          - [36,   0.5,   75]         # don   - smaller
          - [48,   0.5,   100]        # KA    - rim strike (higher)
          - [36,   0.5,   85]         # don   - medium
          - [36,   0.5,   70]         # don   - building
          - [48,   0.5,   105]        # KA    - rim strike
          # Second measure — variation
          - [36,   0.5,   115]        # DON   - strongest
          - [48,   0.25,  90]         # KA    - quick
          - [48,   0.25,  85]         # KA    - double
          - [36,   0.5,   100]        # DON   - anchor
          - [36,   0.5,   75]         # don   - softer
          - [48,   0.25,  95]         # KA
          - [36,   0.25,  80]         # don
          - [36,   0.5,   110]        # DON   - phrase end

      # Spirit-combat overlay — sho swells during spirit battles
      - phrase_id: battle_spirit_swell
        name: "Spirit combat swell"
        tags: [spirit, combat, sho, overlay]
        notes:
          - [52,   3.5,   50]         # E3    - sho drone, building
          - [59,   3.5,   55]         # B3    - fifth added
          - [64,   3.5,   60]         # E4    - octave joins
          - [65,   3.5,   55]         # F4    - dark second, tension
          - [59,   7.0,   65]         # B3    - sustained peak
          - [52,   7.0,   45]         # E3    - fade back to root

    chord_progression:
      progression_id: battle_chords
      name: "Battle harmonies"
      key_root: 64
      scale: in_scale
      tags: [battle, urgent]
      chords:
        - name: Em_power
          pitches: [40, 52, 64]       # E2 E3 E4 — unison octaves, raw power
          duration: 3.5
          velocity: 95
          instrument: cello
        - name: F_tension
          pitches: [41, 53, 65]       # F2 F3 F4 — flat II, maximum tension
          duration: 3.5
          velocity: 90
          instrument: cello
        - name: Am
          pitches: [45, 52, 57, 64]   # A2 E3 A3 E4 — iv chord, dark
