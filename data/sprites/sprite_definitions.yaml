# =============================================================================
# Ma no Kuni (間の国) - Master Sprite Definitions
# =============================================================================
#
# All sprite data for the game's visual system.
#
# Conventions:
#   - dimensions: [width, height] in pixels
#   - palette_mode: material | spirit | both
#   - animation_speed: base multiplier (1.0 = normal)
#   - frame_count: total frames in the animation
#   - frame_duration_ms: per-frame display time
#   - pixel_data: 2D array of palette indices (row-major, [y][x])
#                 Only provided for base/idle frames of key sprites.
#                 Index 0 is always transparent.
#
# Size tiers:
#   - 32x32: environment tiles, small effects
#   - 64x64: characters, NPCs, medium spirits
#   - 128x128: bosses, important spirits, large set pieces
# =============================================================================

